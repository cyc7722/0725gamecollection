<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>釋迦漂漂河 - 角色回饋精緻優化版 🍈🚣</title>

<style>
    body { 
        margin: 0; 
        overflow: hidden; 
        background: #e2f5d3; 
        font-family: "Microsoft JhengHei";
        position: fixed;
        width: 100%;
        height: 100%;
        touch-action: none; 
        -webkit-user-select: none; 
        user-select: none;
    }
    canvas { display: block; background: transparent; }

    /* 遊戲首頁說明畫面 */
    #startScreen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(40, 50, 40, 0.85); z-index: 200;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; text-align: center;
    }
    .start-box {
        background: rgba(255, 255, 255, 0.95); color: #333;
        padding: 25px; border-radius: 20px; width: 80%; max-width: 450px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 5px solid #58b9ff;
    }
    .start-box h1 { margin-top: 0; color: #2e7d32; font-size: 30px; }
    .start-box ul { text-align: left; font-size: 15px; line-height: 1.6; margin: 15px 0; padding-left: 20px; }
    .start-box ul li { margin-bottom: 8px; }
    .btn-start {
        font-size: 22px; padding: 12px 35px; background: #58b9ff; color: white;
        border: none; border-radius: 15px; font-weight: bold; cursor: pointer;
        box-shadow: 0 5px 10px rgba(0,0,0,0.2); display: inline-block;
    }

    /* 手機版頂部 UI 排版 */
    #ui {
        position: absolute; top: 10px; left: 5%; width: 90%;
        color: black; font-size: 18px; font-weight: bold; z-index: 10;
        background: rgba(255, 255, 255, 0.85); padding: 8px 0; border-radius: 10px;
        text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* 題目視窗 */
    #questionDisplay {
        position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
        width: 85%; background: rgba(255, 255, 255, 0.95);
        border: 4px solid #58b9ff; border-radius: 15px; padding: 10px;
        text-align: center; font-size: 16px; font-weight: bold;
        display: none; z-index: 5; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* 每題答對或答錯的即時回饋彈窗（新增內襯排版，容納上方的放大角色圖片） */
    #feedbackDisplay {
        position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
        padding: 20px 30px; z-index: 80; text-align: center;
        box-shadow: 0 6px 25px rgba(0,0,0,0.4); border-radius: 20px;
        display: none; width: 75%; max-width: 320px;
    }
    /* 答對與答錯的文字樣式 */
    #feedbackText {
        font-size: 22px; font-weight: bold; color: white; margin-top: 10px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    /* 用於裝載動態變身釋迦寶寶圖片的容器 */
    #feedbackAvatar {
        width: 140px; height: 140px; object-fit: contain; margin: 0 auto 5px auto; display: block;
    }
    .correct-bg { background: rgba(40, 167, 69, 0.95); border: 4px solid #7bf199; }
    .wrong-bg { background: rgba(220, 53, 69, 0.95); border: 4px solid #ff8894; }

    /* 遊戲結束的大彈窗 */
    #message {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: white; font-size: 36px; text-shadow: 2px 2px 0 #000;
        text-align: center; display: none; z-index: 100;
        background: rgba(0,0,0,0.7); padding: 30px; border-radius: 20px;
        width: 70%;
    }

    @media (min-width: 768px) {
        #ui { position: absolute; top: 20px; left: 20px; width: auto; font-size: 28px; padding: 10px 20px; text-align: left; }
        #questionDisplay { top: 30px; font-size: 26px; width: 70%; padding: 15px; }
        #feedbackDisplay { width: 50%; max-width: 400px; padding: 25px 40px; }
        #feedbackText { font-size: 30px; }
        #feedbackAvatar { width: 180px; height: 180px; }
        #message { font-size: 50px; }
        .start-box h1 { font-size: 38px; }
        .start-box ul { font-size: 18px; }
    }
</style>
</head>

<body>

<div id="startScreen">
    <div class="start-box">
        <h1>釋迦漂漂河 🍈🚣</h1>
        <hr style="border: 0; height: 1px; background: #ccc;">
        <ul>
            <li><strong>🎮 操控方式：</strong>電腦請用鍵盤左右鍵；手機平板請點擊畫面<strong>左半邊（向左跳格）</strong>或<strong>右半邊（向右跳格）</strong>控制移動。</li>
            <li><strong>🏆 過關條件：</strong>成功正確回答 <strong>3 題</strong> 稅務挑戰。</li>
            <li><strong>💔 失敗條件：</strong>生命值（❤️）共有 3 點，答錯或時間截止時未停在正確河道，即扣除 1 點。</li>
            <li><strong>💡 貼心提示：</strong>可以直接用身體去撞正確的文物，或是在文物掉到底部前，將釋迦寶寶開到正確的河道上待命結算！</li>
        </ul>
        <button class="btn-start" onclick="startGame()">開始遊戲</button>
    </div>
</div>

<div id="ui">
    ❤️ 生命：<span id="hp">3</span> &nbsp;&nbsp;&nbsp;&nbsp; 🏆 成功：<span id="correctCount">0</span> / 3
</div>

<div id="questionDisplay"></div>

<div id="feedbackDisplay">
    <img id="feedbackAvatar" src="character.png" alt="狀態圖">
    <div id="feedbackText"></div>
</div>

<div id="message">
    <span id="msgText"></span><br>
    <button onclick="location.reload()" style="font-size:20px; padding:10px 20px; margin-top:15px; cursor:pointer; background:#58b9ff; color:white; border:none; border-radius:12px; font-weight:bold;">重新開始</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 宣告核心變數
let riverWidth, riverLeft, riverRight, laneWidth;
let hp = 3;
let currentCorrectCount = 0;
let gameRunning = false;       
let gameStarted = false;       
let isAnswering = false;
let isShowingFeedback = false; 
let showCorrectLaneHighlight = false; 

const bg = new Image(); bg.src = "background_new.png"; 

// 圖片載入定義
const playerNormalImg = new Image(); playerNormalImg.src = "character.png";
const playerFailImg = new Image(); playerFailImg.src = "character_fail.png";
const playerSuccessImg = new Image(); playerSuccessImg.src = "character_success.png"; 
let playerImg = playerNormalImg; 

const artifactSrcs = ["1.png", "2.png", "3.png", "4.png"];
const artifactImages = artifactSrcs.map(src => {
    const img = new Image();
    img.src = src;
    return img;
});

// 建立玩家物件（使用格子精準定位系統，預設初始在軌道 1）
const player = { currentLane: 1, x: 0, y: 0, width: 110, height: 110, speed: 14, vx: 0 };

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    if (window.innerWidth < 768) {
        riverWidth = window.innerWidth * 0.75; 
        laneWidth = riverWidth / 4;
        player.width = Math.min(laneWidth * 0.85, 95) || 90;
        player.height = Math.min(laneWidth * 0.85, 95) || 90;
    } else {
        riverWidth = Math.min(window.innerWidth * 0.8, 800); 
        laneWidth = riverWidth / 4;
        player.width = 120;
        player.height = 120;
    }
    
    riverLeft = (canvas.width - riverWidth) / 2;
    riverRight = riverLeft + riverWidth;

    if(player) {
        player.y = canvas.height - (player.height + 25);
        alignPlayerToLane();
    }
}

function alignPlayerToLane() {
    player.x = riverLeft + (player.currentLane * laneWidth) + (laneWidth / 2 - player.width / 2);
}

// 初始化位置與視窗綁定
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 原始題庫
const baseQuestions = [
    { q:"雲端發票的好處是？", a:["容易遺失","可自動對獎","要付費","不能存手機"], correct:1 },
    { q:"哪一個是地方稅？", a:["關稅","貨物稅","房屋稅","證交稅"], correct:2 },
    { q:"使用牌照稅的開徵期間？", a:["4/1~4/30","5/1~5/31","10/1~10/31","11/1~11/30"], correct:0 },
    { q:"房屋稅的納稅義務基準日是哪一天？", a:["1月1日","2月末日","3月22日","8月31日"], correct:1 },
    { q:"地價稅的納稅義務基準日是哪一天？", a:["3月22日","8月31日","9月22日","11月1日"], correct:1 },
    { q:"全國單一自住房屋，稅率是多少？", a:["1%","1.2%","1.5%","2%"], correct:0 },
    { q:"房屋稅2.0新制，自住房屋增訂戶籍登記之對象可以是誰？", a:["本人","配偶","直系親屬","以上皆是"], correct:3 },
    { q:"下列何者不能代收稅款?", a:["本國銀行","農會信用部","郵局","便利商店(限額3萬元)"], correct:2 },
    { q:"同一納稅義務人於同一縣市的使用牌照稅繳款書，最多可申請幾張合併成一張?", a:["3張","5張","7張","10張"], correct:1 },
    { q:"若符合地價稅減免及特別稅率應於何時前提出申請，才可於當年度適用？？", a:["2月末日","3月22日","8月31日","9月22日"], correct:3 },
];

// 運作題庫：實作不重複抽題的動態陣列
let availableQuestions = [...baseQuestions];

let activeOptions = [];
const keys = {};
let currentCorrectLane = -1; 

function startGame() {
    document.getElementById("startScreen").style.display = "none"; 
    gameRunning = true;  
    gameStarted = true;  
    gameLoop();          
    setInterval(spawnQuestion, 2500); 
}

function spawnQuestion() {
    if (!gameStarted || isAnswering || !gameRunning || isShowingFeedback) return; 
    isAnswering = true;
    showCorrectLaneHighlight = false; 

    if (availableQuestions.length === 0) {
        availableQuestions = [...baseQuestions]; 
    }
    
    let randomIndex = Math.floor(Math.random() * availableQuestions.length);
    let currentQ = availableQuestions.splice(randomIndex, 1)[0];

    const qBox = document.getElementById("questionDisplay");
    qBox.innerText = "⭐ 題目：" + currentQ.q;
    qBox.style.display = "block";

    currentCorrectLane = currentQ.correct; 
    activeOptions = [];
    let objSize = laneWidth * 0.75; 
    for (let i = 0; i < 4; i++) {
        activeOptions.push({
            x: riverLeft + (i * laneWidth) + (laneWidth/2 - objSize/2),
            y: -120,
            width: objSize,
            height: objSize,
            img: artifactImages[i % artifactImages.length],
            text: currentQ.a[i],
            isCorrect: (i === currentQ.correct),
            laneIndex: i
        });
    }
}

function getPlayerLane() {
    return player.currentLane;
}

function drawGameScene() {
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(100, 220, 255, 0.25)"; 
    ctx.fillRect(riverLeft, 0, riverWidth, canvas.height);
    ctx.fillStyle = "rgba(255, 255, 255, 0.55)"; 
    ctx.fillRect(riverLeft, 0, riverWidth, canvas.height);

    let playerLane = getPlayerLane();

    for (let i = 0; i <= 4; i++) {
        let lx = riverLeft + (i * laneWidth);
        
        if (i === playerLane && i < 4 && !showCorrectLaneHighlight) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
            ctx.fillRect(lx, 0, laneWidth, canvas.height);
        }

        if (showCorrectLaneHighlight && i === currentCorrectLane) {
            ctx.fillStyle = "rgba(255, 235, 59, 0.45)"; 
            ctx.fillRect(lx, 0, laneWidth, canvas.height);
        }

        ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
        ctx.setLineDash([10, 10]);
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(lx, 0);
        ctx.lineTo(lx, canvas.height);
        ctx.stroke();
    }
    ctx.setLineDash([]);
}

function updateOptions(){
    activeOptions.forEach((o) => {
        if (!isShowingFeedback) {
            o.y += 2.2; 
        }
        
        ctx.drawImage(o.img, o.x, o.y, o.width, o.height);
        
        ctx.fillStyle = "black";
        let fontSize = window.innerWidth < 768 ? "14px" : "20px";
        ctx.font = "bold " + fontSize + " Microsoft JhengHei";
        ctx.textAlign = "center";
        ctx.fillText(o.text, o.x + o.width/2, o.y + o.height + 22);

        if(!isShowingFeedback &&
            player.x + 10 < o.x + o.width &&
            player.x + player.width - 10 > o.x &&
            player.y < o.y + o.height &&
            player.y + player.height > o.y
        ){
            checkResult(o.isCorrect);
        }
    });

    if (!isShowingFeedback) {
        if(activeOptions.length > 0 && activeOptions[0].y > canvas.height) {
            let playerCurrentLane = getPlayerLane(); 
            if (playerCurrentLane === currentCorrectLane) {
                checkResult(true);  
            } else {
                checkResult(false); 
            }
        }
    }
}

function checkResult(isRight) {
    if (isShowingFeedback) return; 
    isShowingFeedback = true;

    const feedbackBox = document.getElementById("feedbackDisplay");
    const feedbackText = document.getElementById("feedbackText");
    const feedbackAvatar = document.getElementById("feedbackAvatar");

    if(isRight) {
        currentCorrectCount++;
        feedbackText.innerText = "恭喜回答正確🤗";
        feedbackBox.className = "correct-bg";
        playerImg = playerSuccessImg; 
        feedbackAvatar.src = "character_success.png"; // 視窗內同步換上答對舉旗圖
    } else {
        hp--;
        feedbackText.innerText = "回答錯誤，再想想🫨";
        feedbackBox.className = "wrong-bg";
        playerImg = playerFailImg; 
        feedbackAvatar.src = "character_fail.png";    // 視窗內同步換上答錯驚嚇圖
        showCorrectLaneHighlight = true; 
    }
    
    document.getElementById("hp").innerText = hp;
    document.getElementById("correctCount").innerText = currentCorrectCount;
    feedbackBox.style.display = "block";

    setTimeout(() => {
        document.getElementById("questionDisplay").style.display = "none";
        feedbackBox.style.display = "none";
        
        isShowingFeedback = false;
        isAnswering = false;
        activeOptions = [];
        showCorrectLaneHighlight = false; 
        playerImg = playerNormalImg; 
        currentCorrectLane = -1;

        if (currentCorrectCount >= 3) {
            endGame("修復成功！✨");
        } else if (hp <= 0) {
            endGame("修復失敗 😭");
        }
    }, 1200);
}

function handlePlayerMovement() {
    if (isShowingFeedback) {
        player.vx = 0;
        return;
    }

    let moveLeft = false;
    let moveRight = false;

    if (keys["ArrowLeft"] || keys["a"] || keys["A"]) { moveLeft = true; keys["ArrowLeft"] = keys["a"] = keys["A"] = false; }
    if (keys["ArrowRight"] || keys["d"] || keys["D"]) { moveRight = true; keys["ArrowRight"] = keys["d"] = keys["D"] = false; }

    if (moveLeft && player.currentLane > 0) {
        player.currentLane--;
    }
    if (moveRight && player.currentLane < 3) {
        player.currentLane++;
    }

    let targetX = riverLeft + (player.currentLane * laneWidth) + (laneWidth / 2 - player.width / 2);
    player.x += (targetX - player.x) * 0.4; 
}

function gameLoop(){
    if(!gameRunning) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGameScene();
    handlePlayerMovement();
    
    // --- 比例校正優化點：將 character_success 與 character_fail 同步加入 1.25 倍等比例正方形擴張機制，防擠壓 ---
    if (playerImg === playerFailImg || playerImg === playerSuccessImg) {
        let expandedWidth = player.width * 1.25;
        let expandedHeight = player.height * 1.25;
        let drawX = player.x - (expandedWidth - player.width) / 2;
        let drawY = player.y - (expandedHeight - player.height) / 2;
        ctx.drawImage(playerImg, drawX, drawY, expandedWidth, expandedHeight);
    } else {
        ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
    }
    
    if(isAnswering || isShowingFeedback) updateOptions();
    requestAnimationFrame(gameLoop);
}

window.addEventListener("keydown", (e) => keys[e.key] = true);

// 手機版精準格點控制
window.addEventListener("touchstart", (e) => {
    if (!gameStarted || !gameRunning || isShowingFeedback) return;
    let clickX = e.touches[0].clientX;
    if (clickX < window.innerWidth / 2) {
        if (player.currentLane > 0) player.currentLane--;
    } else {
        if (player.currentLane < 3) player.currentLane++;
    }
}, {passive: true});

window.addEventListener("touchmove", (e) => {}, {passive: true});
window.addEventListener("touchend", () => {});

function endGame(text){
    gameRunning = false;
    document.getElementById("message").style.display = "block";
    document.getElementById("msgText").innerText = text;
}
</script>
</body>
</html>
