<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>租稅小達人！程式設計大挑戰-精選作品展示</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --ink: #18231d;
      --muted: #6f776f;
      --accent: #bf5b3f;
      --line: rgba(24, 35, 29, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 8% 0%, rgba(191, 91, 63, 0.16), transparent 28rem),
                  radial-gradient(circle at 100% 15%, rgba(52, 115, 91, 0.15), transparent 30rem),
                  var(--bg);
    }
    .shell {
      width: min(1240px, calc(100% - 32px));
      margin: auto;
    }
    header { padding: 48px 0 24px; }
    .eyebrow {
      color: var(--accent);
      font-weight: 900;
      letter-spacing: .18em;
      font-size: 12px;
    }
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.1;
      letter-spacing: -.03em;
      margin: 12px 0;
    }
    .intro {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      padding-bottom: 60px;
    }
    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 16px 45px rgba(28, 39, 32, .08);
      transition: .25s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 60px rgba(28, 39, 32, .13);
    }
    .card > a { text-decoration: none; color: inherit; }
    .thumb-wrap {
      position: relative;
      aspect-ratio: 16/10;
      overflow: hidden;
      background: linear-gradient(135deg, #dbe4dc, #f1d7ca);
    }
    .thumb {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    iframe {
      position: absolute;
      z-index: 2;
      inset: 0;
      width: 160%;
      height: 160%;
      border: 0;
      transform: scale(.625);
      transform-origin: top left;
      pointer-events: none;
      background: #fff;
    }
    .fallback {
      position: absolute;
      z-index: 1;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    .fallback b { font-size: 32px; }
    .fallback span { font-size: 20px; font-weight: 900; }
    .fallback small { color: var(--muted); }
    .overlay {
      position: absolute;
      z-index: 4;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(16, 27, 21, .48);
      color: white;
      font-weight: 900;
      opacity: 0;
      transition: .2s;
    }
    .card:hover .overlay { opacity: 1; }
    .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px;
    }
    .id {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: #eadfd2;
      color: var(--accent);
      font-weight: 900;
    }
    h2 { margin: 0; font-size: 21px; }
    p { margin: 4px 0 0; color: var(--muted); }
    .go {
      margin-left: auto;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      border-bottom: 1px solid;
    }
    @media(max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    function nextSource(img) {
      const sources = (img.dataset.sources || '').split('||').filter(Boolean);
      let currentIndex = Number(img.dataset.index || 0) + 1;
      if (currentIndex < sources.length) {
        img.dataset.index = String(currentIndex);
        img.src = sources[currentIndex];
      } else {
        // 若第三方縮圖服務全部失敗，隱藏 <img> 標籤，讓底層的 iframe 或 fallback 卡片顯示[cite: 1, 2]
        img.style.display = 'none';
      }
    }
  </script>
